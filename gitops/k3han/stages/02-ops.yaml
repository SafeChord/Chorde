apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-ops
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: chorde
  source:
    repoURL: https://github.com/rebodutch/Chorde.git
    targetRevision: feat/gitops-v2-refactor
    path: gitops/k3han/manifests/02-ops
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
