apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: k3han-bootstrap
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  generators:
    - list:
        elements:
          - service: sealed-secrets
            wave: "1"
          - service: system-upgrade
            wave: "1"
          - service: keda
            wave: "1"
          - service: ingress-public
            wave: "2"
          - service: ingress-private
            wave: "2"
          # Gateway API / NGF private path (replaces ingress-private after soak).
          # Ordered: CRDs (3) → controller + tunnel (4) → Gateway & routes (5).
          - service: gateway-api-crds
            wave: "3"
          - service: nginx-gateway-fabric
            wave: "4"
          - service: cloudflared
            wave: "4"
          - service: private-gateway
            wave: "5"
  template:
    metadata:
      name: 'bootstrap-{{service}}'
      annotations:
        argocd.argoproj.io/sync-wave: '{{wave}}'
      labels:
        k3han.io/stage: bootstrap
        k3han.io/service: '{{service}}'
        argocd.argoproj.io/managed-by: applicationSet
    spec:
      project: chorde
      source:
        repoURL: https://github.com/SafeChord/Chorde.git
        targetRevision: main
        path: 'gitops/k3han/manifests/{{service}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: argocd
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
