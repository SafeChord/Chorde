apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: stage-bootstrap
  namespace: argocd
spec:
  project: chorde
  source:
    repoURL: https://github.com/rebodutch/Chorde.git
    targetRevision: feat/gitops-v2-refactor
    path: gitops/k3han/manifests/00-bootstrap
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true