controller:
  type: daemonset
  nodeSelector:
    chorde.io/tier: medium
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

alloy:
  enabled: false

ingress:
  enabled: false
