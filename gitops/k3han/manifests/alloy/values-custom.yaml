controller:
  type: daemonset
  nodeSelector:
    chorde.io/tier: medium
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
    - key: node-role.kubernetes.io/master
      operator: Exists
      effect: NoSchedule

alloy:
  mounts:
    varlog: true
    dockercontainers: false
  extraArgs:
    - --disable-reporting
  configMap:
    create: true
    content: |
      logging {
        level  = "info"
        format = "logfmt"
      }

      discovery.kubernetes "pods" {
        role = "pod"
      }

      discovery.relabel "local_pods" {
        targets = discovery.kubernetes.pods.targets

        // 1. 節點過濾
        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          action = "keep"
          regex  = env("HOSTNAME")
        }

        // 2. 關鍵標籤轉正 (必須在這裡做，否則採集後就抓不到了)
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          target_label  = "node_name"
        }

      }

      loki.source.kubernetes "pods" {
        targets    = discovery.relabel.local_pods.output
        forward_to = [loki.relabel.agent_label.receiver]
      }

      loki.relabel "agent_label" {
        forward_to = [loki.process.drop_old.receiver]

        rule {
          replacement  = "alloy"
          target_label = "job"
        }
      }

      loki.process "drop_old" {
        stage.drop {
          older_than          = "168h"
          drop_counter_reason = "entry_too_old"
        }
        forward_to = [loki.write.local.receiver]
      }

      loki.write "local" {
        endpoint {
          url = "http://loki.loki.svc.cluster.local:3100/loki/api/v1/push"
        }
      }

ingress:
  enabled: false
