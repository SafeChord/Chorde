# argocd UI route. Lives in the argocd ns → same-ns backendRef (no ReferenceGrant);
# attaches cross-ns to private-gateway. Path-based, no rewrite (argocd is subpath-aware).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: private-gateway
      namespace: nginx-gateway
  hostnames:
    - k3han.omh.idv.tw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /argocd
      backendRefs:
        - name: argocd-server
          port: 80
