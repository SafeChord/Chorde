# grafana UI route. Lives in the monitoring ns → same-ns backendRef (no ReferenceGrant);
# attaches cross-ns to private-gateway. Path-based, no rewrite (grafana is subpath-aware).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: private-gateway
      namespace: nginx-gateway
  hostnames:
    - k3han.omh.idv.tw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /grafana
      backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
