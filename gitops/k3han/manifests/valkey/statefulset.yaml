apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: redis
  labels:
    app.kubernetes.io/name: valkey
    app.kubernetes.io/instance: valkey-primary
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  serviceName: valkey
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: valkey
      app.kubernetes.io/instance: valkey-primary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: valkey
        app.kubernetes.io/instance: valkey-primary
    spec:
      securityContext:
        fsGroup: 1001
      containers:
        - name: valkey
          image: valkey/valkey:8.1
          imagePullPolicy: Always
          command: ["sh", "-c", "valkey-server --requirepass $VALKEY_PASSWORD --appendonly yes"]
          env:
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
          ports:
            - name: valkey
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: chorde.io/tier
                    operator: In
                    values:
                      - medium
                  - key: chorde.io/region
                    operator: In
                    values:
                      - tw
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: local-nfs
        resources:
          requests:
            storage: 1Gi
