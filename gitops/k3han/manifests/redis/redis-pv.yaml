apiVersion: v1
kind: PersistentVolume
metadata:
  name: acer-nfs-1g-2
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  capacity:
    storage: 1Gi
  storageClassName: local-nfs
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    path: /mnt/k3s/pv/1g/2
    server: 192.168.0.2