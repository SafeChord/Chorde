apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitnami-redis
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    k3han.io/service: redis
    argocd.argoproj.io/managed-by: application
spec:
  project: chorde
  sources:
    - repoURL: https://github.com/SafeChord/Chorde.git
      targetRevision: feat/gitops-v2-refactor
      ref: chorde-repo
    
    - repoURL: https://charts.bitnami.com/bitnami
      chart: redis
      targetRevision: 24.1.2
      helm:
        valueFiles:
          - $chorde-repo/gitops/k3han/manifests/redis/values-custom.yaml
    
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: redis

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true