apiVersion: upgrade.cattle.io/v1
kind: Plan
metadata:
  name: k3s-agent-plan
  namespace: system-upgrade
spec:
  concurrency: 1
  prepare:
    args: ["prepare", "k3s-server-plan"]
    image: rancher/k3s-upgrade
  drain:
    force: true
    skipWaitForDeleteTimeout: 60
  nodeSelector:
    matchLabels:
      k3s-agent-upgrade: "true"
  serviceAccountName: system-upgrade
  upgrade:
    image: rancher/k3s-upgrade
  version: v1.34.3+k3s1

  # tolerations for gce-agent-tw
  tolerations:
  - key: chorde.io/purpose
    operator: Equal
    value: proxy-only            
    effect: NoSchedule 