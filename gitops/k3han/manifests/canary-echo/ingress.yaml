apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary-echo-public
  namespace: default
  annotations:
    kubernetes.io/ingress.class: "nginx-public"
spec:
  rules:
    - host: "www.omh.idv.tw"
      http:
        paths:
          - path: /canary
            pathType: Prefix
            backend:
              service:
                name: canary-echo
                port:
                  number: 80
