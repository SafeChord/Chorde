apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: echo-public
  namespace: testing
  annotations:
    kubernetes.io/ingress.class: "nginx-public"
    argocd.argoproj.io/sync-wave: "2"
spec:
  rules:
    - host: "www.omh.idv.tw"
      http:
        paths:
          - path: /echo
            pathType: Prefix
            backend:
              service:
                name: echo
                port:
                  number: 80
