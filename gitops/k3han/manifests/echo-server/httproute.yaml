# echo public route. Lives in the testing ns → same-ns backendRef + same-ns
# AuthenticationFilter (no ReferenceGrant). Attaches cross-ns to public-gateway's
# HTTPS listener. Replaces the nginx-public Ingress.
# Filter order (applied in sequence): auth gate → strip /echo prefix → backend.
# NOTE: server_tokens off (a SnippetsFilter) is DEFERRED with the real-ip +
# rate-limit pair — enabling NGF's SnippetsFilters feature (raw-nginx injection)
# for a single directive isn't worth the surface; do it once, later, alongside
# real-ip (also a SnippetsFilter). This route stays native Gateway API only.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: testing
spec:
  parentRefs:
    - name: public-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - www.omh.idv.tw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /echo
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: echo-basic-auth
        # Mirrors the old nginx rewrite-target:/ — strip the /echo prefix so the
        # backend (traefik/whoami) sees "/".
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: echo
          port: 80
