# echo public route. Lives in the testing ns → same-ns backendRef + same-ns
# AuthenticationFilter/SnippetsFilter secret refs (no ReferenceGrant). Attaches
# cross-ns to public-gateway's HTTPS listener. Replaces the nginx-public Ingress.
# Filter order matters (applied in sequence): auth gate → strip /echo prefix →
# backend. server_tokens snippet is server-context (placement-agnostic).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: echo
  namespace: testing
spec:
  parentRefs:
    - name: public-gateway
      namespace: nginx-gateway
      sectionName: https
  hostnames:
    - www.omh.idv.tw
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /echo
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: SnippetsFilter
            name: echo-server-tokens
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: AuthenticationFilter
            name: echo-basic-auth
        # Mirrors the old nginx rewrite-target:/ — strip the /echo prefix so the
        # backend (traefik/whoami) sees "/".
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: echo
          port: 80
