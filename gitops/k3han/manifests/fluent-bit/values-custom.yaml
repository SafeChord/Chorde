nodeSelector:
  chorde.io/tier: low

tolerations:
  - key: chorde.io/purpose
    operator: Equal
    value: proxy-only
    effect: NoSchedule

metrics:
  enabled: false

serviceMonitor:
  enabled: false

dashboards:
  enabled: false

config:
  service: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf

  inputs: |
    [INPUT]
        Name             tail
        Path             /var/log/containers/*.log
        Tag              raw.logs
        Read_from_Head   On

  filters: |
    # 完全沒有 Filter，求最快路徑

  outputs: |
    [OUTPUT]
        Name            http
        Match           *
        Host            loki-mock.loki.svc.cluster.local
        Port            3100
        URI             /test-log-flow
        Format          json
        header          X-Diagnostic-Source fluent-bit-diagnoser
