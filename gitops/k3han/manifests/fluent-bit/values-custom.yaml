nodeSelector:
  chorde.io/tier: low

tolerations:
  - key: chorde.io/purpose
    operator: Equal
    value: proxy-only
    effect: NoSchedule

metrics:
  enabled: false

serviceMonitor:
  enabled: false

dashboards:
  enabled: false

config:
  service: |
    [SERVICE]
        Flush        1
        Daemon       Off
        Log_Level    info
        Parsers_File parsers.conf
        Parsers_File custom_parsers.conf
        HTTP_Server  On

  customParsers: |
    [PARSER]
        Name k8s-tag-parser
        Format regex
        Regex ^(?<pod_name>[^_]+)_(?<namespace_name>[^_]+)_(?<container_name>.+)-(?<docker_id>[a-z0-9]{64})\.log$
    [PARSER]
        Name cri
        Format regex
        Regex ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]+) (?<message>.*)$
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

  inputs: |
    [INPUT]
        Name             tail
        Path             /var/log/containers/*.log
        Exclude_Path     /var/log/containers/fluent-bit-*.log
        Parser           cri
        Tag              kube.*
        DB               /var/log/flb_kube.db
        Read_from_Head   Off
        Refresh_Interval 5
        Buffer_Chunk_Size 128k
        Buffer_Max_Size  512k

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Regex_Parser        k8s-tag-parser
        Merge_Log           On
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

    [FILTER]
        Name                nest
        Match               kube.*
        Operation           lift
        Nested_under        kubernetes
        Add_prefix          k8s_

    [FILTER]
        Name                modify
        Match               kube.*
        Rename              k8s_namespace_name namespace
        Rename              k8s_pod_name pod
        Rename              k8s_container_name container
        Rename              k8s_host node_name
        Add                 job fluent-bit

  outputs: |
    [OUTPUT]
        Name              loki
        Match             *
        Host              loki.loki.svc.cluster.local
        Port              3100
        Labels            job=fluent-bit
        label_keys        $namespace,$pod,$container,$node_name
        auto_kubernetes_labels off
        line_format       json
        remove_keys       job

    [OUTPUT]
        Name              stdout
        Match             *
