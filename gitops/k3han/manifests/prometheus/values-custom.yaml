alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['namespace', 'alertname']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack
      routes:
        - matchers:
            - alertname = "Watchdog"
          receiver: "null"
        # K3s integrates kube-proxy/scheduler/controller-manager into a single binary
        # and does not expose their individual metrics endpoints. These alerts will
        # always fire on K3s clusters and are not actionable.
        - matchers:
            - alertname =~ "KubeProxyDown|KubeSchedulerDown|KubeControllerManagerDown"
          receiver: "null"
        # TargetDown fired due to K3s built-in components not exposing scrape targets.
        - matchers:
            - alertname = "TargetDown"
            - namespace =~ "kube-system|monitoring"
          receiver: "null"
    receivers:
      - name: "null"
      - name: slack
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-slack-secret/slack_webhook_url
            channel: '#k3han-error-notification'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              *Namespace:* {{ .Labels.namespace }}
              *Pod:* {{ .Labels.pod }}
              *Severity:* {{ .Labels.severity }}
              *Message:* {{ .Annotations.summary }}
              {{ end }}
    templates:
      - /etc/alertmanager/config/*.tmpl

  alertmanagerSpec:
    secrets:
      - alertmanager-slack-secret
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

grafana:
  serviceMonitor:
    enabled: false
  admin:
    existingSecret: grafana-admin-secret
    userKey: admin-user
    passwordKey: admin-password

  ingress:
    enabled: true
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    ingressClassName: nginx-private
    hosts:
      - k3han.omh.idv.tw
    path: /grafana

  grafana.ini:
    server:
      root_url: "http://k3han.omh.idv.tw/grafana/"
      serve_from_sub_path: true

  sidecar:
    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      searchNamespace: ALL

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

kube-state-metrics:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# Rewrite kubelet scrape targets to use Tailscale IPs (EXTERNAL-IP) so
# Prometheus on ct-serv-jp can reach agent nodes across the mesh.
kubelet:
  serviceMonitor:
    # /metrics endpoint
    relabelings: &tailscale-relabel
      # acer-agent: 192.168.0.2 → 100.64.1.21
      - sourceLabels: [__address__]
        regex: '192\.168\.0\.2:(.*)'
        targetLabel: __address__
        replacement: '100.64.1.21:$1'
      # gce-agent-tw: 10.140.0.5 → 100.64.2.21
      - sourceLabels: [__address__]
        regex: '10\.140\.0\.5:(.*)'
        targetLabel: __address__
        replacement: '100.64.2.21:$1'
    # /metrics/cadvisor endpoint
    cAdvisorRelabelings: *tailscale-relabel
    # /metrics/probes endpoint
    probesRelabelings: *tailscale-relabel

prometheus-node-exporter:
  # to aviod node exporter mount the root directory on machines
  hostRootFsMount:
    enabled: false

prometheusOperator:  
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: Exists
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

prometheus:
  prometheusSpec:
    # the record be reserved in 7 days
    retention: 7d
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: Exists
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi
    