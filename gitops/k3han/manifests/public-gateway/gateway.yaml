# Public gateway data-plane config + the Gateway itself.
# NginxProxy: the edge data plane. Pinned to gce-agent-tw (the only node labeled
# chorde.io/purpose=proxy-only) and bound to the host's 80/443 via hostPorts, so
# it serves public traffic exactly where ingress-public used to. Reuses the
# EXISTING control plane on ct-serv-jp (1 brain, 2 data planes: private + public).
# No resource limits yet — observe real usage on the 1GB edge first, constrain
# later (not prod; fail-then-tune). Service stays ClusterIP (hostPort is the
# ingress path; the Service is only for in-cluster/test reachability).
apiVersion: gateway.nginx.org/v1alpha2
kind: NginxProxy
metadata:
  name: public-proxy
  namespace: nginx-gateway
spec:
  # Restore the real client IP from CF's X-Forwarded-For (native real_ip; no
  # SnippetsFilter). Without this, logs + any IP-keyed policy (e.g. the echo
  # RateLimitPolicy) would see Cloudflare edge IPs, not real clients.
  # setIPRecursively walks XFF from the end and picks the first NON-trusted IP.
  # trustedAddresses = Cloudflare IPv4 ranges (set_real_ip_from).
  # ⚠️ SSOT for these CIDRs is cluster/k3han/ansible/gce_firewall.yaml
  #    (the GCP firewall allowlist) — keep the two lists in sync; CF ranges drift.
  rewriteClientIP:
    mode: XForwardedFor
    setIPRecursively: true
    trustedAddresses:
      - { type: CIDR, value: "173.245.48.0/20" }
      - { type: CIDR, value: "103.21.244.0/22" }
      - { type: CIDR, value: "103.22.200.0/22" }
      - { type: CIDR, value: "103.31.4.0/22" }
      - { type: CIDR, value: "141.101.64.0/18" }
      - { type: CIDR, value: "108.162.192.0/18" }
      - { type: CIDR, value: "190.93.240.0/20" }
      - { type: CIDR, value: "188.114.96.0/20" }
      - { type: CIDR, value: "197.234.240.0/22" }
      - { type: CIDR, value: "198.41.128.0/17" }
      - { type: CIDR, value: "162.158.0.0/15" }
      - { type: CIDR, value: "104.16.0.0/13" }
      - { type: CIDR, value: "104.24.0.0/14" }
      - { type: CIDR, value: "172.64.0.0/13" }
      - { type: CIDR, value: "131.0.72.0/22" }
  kubernetes:
    service:
      type: ClusterIP
    deployment:
      replicas: 1
      container:
        hostPorts:
          - port: 80
            containerPort: 80
          - port: 443
            containerPort: 443
        # Guardrail only (not capacity) — low-traffic portfolio project, edge is a
        # 1GB node, steady state ~43Mi. The limit caps a runaway from OOMing the
        # shared edge. Memory limit only (no CPU limit → no request-path throttle).
        # Mirrors private-proxy (one mental model across both data planes).
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            memory: 256Mi
      pod:
        nodeSelector:
          chorde.io/purpose: proxy-only
        # gce-agent-tw carries the taint chorde.io/purpose=proxy-only:NoSchedule
        # (same pattern ingress-public tolerated). Required to land on the edge.
        tolerations:
          - key: chorde.io/purpose
            operator: Equal
            value: proxy-only
            effect: NoSchedule
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  infrastructure:
    parametersRef:
      group: gateway.nginx.org
      kind: NginxProxy
      name: public-proxy
  listeners:
    # Plain HTTP — exists only to 301-redirect to HTTPS (see echo-server's
    # httproute-redirect.yaml). No app is served in the clear.
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.omh.idv.tw"
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS — terminates TLS with the wildcard CF Origin cert. The cert lives in
    # this same ns (nginx-gateway) → no ReferenceGrant. One wildcard cert covers
    # every *.omh.idv.tw host; routes pin their own hostname.
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.omh.idv.tw"
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: cloudflare-origin-cert
      allowedRoutes:
        namespaces:
          from: All
