apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-alert-rules
  namespace: loki
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  error-alerts.yaml: |
    groups:
      - name: error-rate-alerts
        rules:
          - alert: HighErrorLogRate
            expr: |
              sum by (namespace, pod) (
                rate({job=~"alloy|fluent-bit"} |~ "(?i)level=error|\"level\":\"error\"|\\bERROR\\b" [5m])
              ) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error log rate in {{ $labels.namespace }}/{{ $labels.pod }}"
