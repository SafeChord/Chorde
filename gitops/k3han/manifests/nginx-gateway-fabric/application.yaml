apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-fabric
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    k3han.io/service: nginx-gateway-fabric
    argocd.argoproj.io/managed-by: application
spec:
  project: chorde
  sources:
    - repoURL: https://github.com/SafeChord/Chorde.git
      targetRevision: main
      ref: chorde-repo

    # OCI Helm chart. ArgoCD 2.12+/3.x: repoURL is the registry path with NO oci://
    # prefix and the chart name in `chart`; no separate repository entry needed.
    - repoURL: ghcr.io/nginx/charts
      chart: nginx-gateway-fabric
      targetRevision: 2.6.3
      helm:
        valueFiles:
          - $chorde-repo/gitops/k3han/manifests/nginx-gateway-fabric/values-custom.yaml

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: nginx-gateway

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
