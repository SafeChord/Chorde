controller:
  kind: Deployment

  ingressClass: nginx-public

  ingressClassResource:
    name: nginx-public
    enabled: true
    default: false
    controllerValue: "k8s.io/ingress-nginx-public"
 
  extraArgs:
    controller-class: "k8s.io/ingress-nginx-public"

  hostPort:
    enabled: true

  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: chorde.io/purpose
                operator: In
                values:
                  - proxy-only
  tolerations:
    - key: chorde.io/purpose
      operator: Equal
      value: proxy-only            
      effect: NoSchedule 

  service:
    enabled: false

# security settings
  config:
    enable-real-ip: "true"
    real-ip-header: "CF-Connecting-IP"
    set-real-ip-from: "173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22"

    limit-connections: "20"
    limit-rps: "5"
    limit-rpm: "60"

    server-tokens: "false"
    proxy-hide-header: "X-Powered-By"
    hide-headers: "X-Powered-By"

    ssl-redirect: "true"
    force-ssl-redirect: "true"

defaultBackend:
  enabled: false
