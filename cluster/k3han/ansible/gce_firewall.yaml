---
# GCP Firewall Hardening: Restrict ingress-public origin to Cloudflare IPs only
#
# Problem: gce-agent-tw HostPort 80/443 is exposed to the public internet.
#          Without this rule, attackers can bypass Cloudflare (DDoS protection,
#          WAF, rate limiting) by connecting directly to the origin IP.
#
# Solution: Allow TCP 80/443 inbound ONLY from Cloudflare published IP ranges.
#           All other sources are implicitly denied by GCP default-deny.
#
# Cloudflare IP source: https://www.cloudflare.com/ips/
# Last verified: 2026-03-08
#
# Author: bradyhau
# Project: SafeChord / Chorde / K3han
# Status: Applied (2026-03-08 via gcloud CLI)
# Applied changes:
#   - Removed tag 'http-server' from gce-agent-tw (disables default-allow-http 0.0.0.0/0)
#   - Added tag 'ingress-public' to gce-agent-tw
#   - Created firewall rule 'allow-cloudflare-http' (tcp:80, CF IPs only)

- name: Harden GCE ingress-public firewall (Cloudflare IP allowlist)
  hosts: localhost
  gather_facts: false

  vars:
    gcp_project: "k3han-452908"
    firewall_rule_name: "allow-cloudflare-http"
    target_tag: "ingress-public"  # Applied to gce-agent-tw (asia-east1-a)

    # Cloudflare IPv4 ranges (https://www.cloudflare.com/ips-v4)
    cloudflare_ipv4:
      - "173.245.48.0/20"
      - "103.21.244.0/22"
      - "103.22.200.0/22"
      - "103.31.4.0/22"
      - "141.101.64.0/18"
      - "108.162.192.0/18"
      - "190.93.240.0/20"
      - "188.114.96.0/20"
      - "197.234.240.0/22"
      - "198.41.128.0/17"
      - "162.158.0.0/15"
      - "104.16.0.0/13"
      - "104.24.0.0/14"
      - "172.64.0.0/13"
      - "131.0.72.0/22"

  tasks:
    - name: Create firewall rule allowing Cloudflare → 80/443 only
      command: >
        gcloud compute firewall-rules create {{ firewall_rule_name }}
          --project={{ gcp_project }}
          --direction=INGRESS
          --priority=1000
          --network=default
          --action=ALLOW
          --rules=tcp:80,tcp:443
          --source-ranges={{ cloudflare_ipv4 | join(',') }}
          --target-tags={{ target_tag }}
          --description="Allow HTTP/HTTPS only from Cloudflare IP ranges. Blocks direct origin access."
      tags: create

    # If the rule already exists, use update instead:
    - name: Update existing firewall rule (idempotent alternative)
      command: >
        gcloud compute firewall-rules update {{ firewall_rule_name }}
          --project={{ gcp_project }}
          --source-ranges={{ cloudflare_ipv4 | join(',') }}
      tags: update

# Manual GCP Console equivalent (for reference):
# VPC Network → Firewall → Create Rule
#   Name:          allow-cloudflare-http-https
#   Direction:     Ingress
#   Action:        Allow
#   Targets:       Specified target tags → ingress-public
#   Source filter: IPv4 ranges → (paste cloudflare_ipv4 above, comma-separated)
#   Protocols:     TCP 80, 443
#   Priority:      1000
#
# IMPORTANT: After applying, verify gce-agent-tw has network tag "ingress-public"
# in GCP Console → Compute Engine → VM instances → gce-agent-tw → Network tags
